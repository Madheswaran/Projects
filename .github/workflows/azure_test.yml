name: Azure Test

on:
  workflow_dispatch:

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

    - uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Test Azure Access
      run: |

        az account show

        az group list -o table

        az acr list -o table

        az aks list -o table