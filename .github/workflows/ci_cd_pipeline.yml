name: PayPal Frontend CI/CD

on:
  workflow_dispatch:

env:
  IMAGE_NAME: frontend-service

jobs:
  build-test-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Dependencies
      working-directory: frontend-service
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

        #    - name: Run Unit Tests
        #working-directory: frontend-service
        #run: |
        #pytest

    - name: Trivy Filesystem Scan
      uses: aquasecurity/trivy-action@v0.33.1
      with:
        scan-type: 'fs'
        scan-ref: '.'
        severity: 'HIGH,CRITICAL'

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to Azure Container Registry
      run: |
        az acr login --name ${{ secrets.ACR_NAME }}

    - name: Build Docker Image
      run: |
        docker build \
          -t ${{ secrets.ACR_NAME }}.azurecr.io/frontend-service:${{ github.sha }} \
          ./frontend-service

    - name: Trivy Image Scan
      uses: aquasecurity/trivy-action@v0.33.1
      with:
        image-ref: ${{ secrets.ACR_NAME }}.azurecr.io/frontend-service:${{ github.sha }}
        severity: 'HIGH,CRITICAL'
        exit-code: '1'

    - name: Push Docker Image
      run: |
        docker push \
          ${{ secrets.ACR_NAME }}.azurecr.io/frontend-service:${{ github.sha }}

    - name: Get AKS Credentials
      run: |
        az aks get-credentials \
          --resource-group ${{ secrets.RESOURCE_GROUP }} \
          --name ${{ secrets.AKS_CLUSTER }} \
          --overwrite-existing

    - name: Install Helm
      uses: azure/setup-helm@v4

    - name: Deploy to AKS
      run: |
        helm upgrade --install frontend \
          ./helm/paypal-frontend \
          --set image.repository=${{ secrets.ACR_NAME }}.azurecr.io/frontend-service \
          --set image.tag=${{ github.sha }}

    - name: Verify Deployment
      run: |
        kubectl rollout status deployment/frontend
        kubectl get pods
        kubectl get svc

    - name: Success
      if: success()
      run: echo "Deployment Successful"

    - name: Failure
      if: failure()
      run: echo "Deployment Failed"
