    #     helm upgrade --install frontend \
    #       ./devops/paypal-frontend-app/helm/paypal-frontend \
    #       --set image.repository=${{ secrets.ACR_NAME }}.azurecr.io/frontend-service \
    #       --set image.tag=${{ github.sha }}

