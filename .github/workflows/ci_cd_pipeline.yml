name: PayPal Frontend CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  security-events: write    

env:
  IMAGE_NAME: frontend-service

jobs:
  build-test-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Run Semgrep Scan
      uses: semgrep/semgrep-action@v1
      with:
        config: auto

    # - name: Install Semgrep
    #   run: |
    #     python -m pip install semgrep

    # - name: Run Semgrep Scan
    #   run: |
    #     semgrep scan \
    #       --config auto \
    #       --error \

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: python

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Dependencies
      working-directory: devops/paypal-frontend-app/frontend-service
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Unit Tests
      working-directory: devops/paypal-frontend-app/frontend-service
      run: |
        export PYTHONPATH=$PWD
        pytest -v

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install wget gnupg lsb-release -y

        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
          gpg --dearmor | \
          sudo tee /usr/share/keyrings/trivy.gpg >/dev/null

        echo \
          "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | \
          sudo tee /etc/apt/sources.list.d/trivy.list

        sudo apt-get update
        sudo apt-get install trivy -y

        trivy --version
   
    - name: Trivy Filesystem Scan
      #uses: aquasecurity/trivy-action@0.28.0
      #with:
      run: |
        trivy fs \
          --severity HIGH,CRITICAL \
          .

    - name: Build Docker Image
      run: |
        docker build \
          -t ${{ secrets.ACR_NAME }}.azurecr.io/frontend-service:${{ github.sha }} \
           -t ${{ secrets.ACR_NAME }}.azurecr.io/frontend-service:latest \
          ./devops/paypal-frontend-app/frontend-service

    - name: Debug Docker Images
      run: |
        echo "Commit SHA = ${{ github.sha }}"
        docker images

    - name: Trivy Image Scan
      #uses: aquasecurity/trivy-action@0.28.0
      #with:
      run: |
        trivy image \
        --severity HIGH,CRITICAL \
        ${{ secrets.ACR_NAME }}.azurecr.io/frontend-service:${{ github.sha }}


    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to Azure Container Registry
      run: |
        az acr login --name ${{ secrets.ACR_NAME }}
        
    - name: Push Docker Image
      run: |
        docker push \
          ${{ secrets.ACR_NAME }}.azurecr.io/frontend-service:${{ github.sha }}
        docker push \
          ${{ secrets.ACR_NAME }}.azurecr.io/frontend-service:latest

    - name: Update Helm values.yaml
      run: |

        sed -i \
          "s/tag:.*/tag: ${{ github.sha }}/" \
          devops/paypal-frontend-app/helm/paypal-frontend/values.yaml

    - name: Commit updated values.yaml
      run: |

        git config --global user.email "github-actions@github.com"
        git config --global user.name "github-actions"

        git add \
          devops/paypal-frontend-app/helm/paypal-frontend/values.yaml

        git commit -m \
          "Updated image tag to ${{ github.sha }}" \
          || echo "No changes"

    # - name: Push changes
    #   run: |

    #     git push \
    #       https://${{ secrets.GH_PAT }}@github.com/Madheswaran/Projects.git

    # - name: Get AKS Credentials
