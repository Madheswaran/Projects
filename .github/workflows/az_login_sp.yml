name: Login test

on:
  workflow_dispatch:

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Get AKS Credentials
      run: |

        az aks get-credentials \
          --resource-group ${{ secrets.RESOURCE_GROUP }} \
          --name ${{ secrets.AKS_CLUSTER }} \
          --overwrite-existing

    - name: Verify Cluster
      run: |

        kubectl cluster-info
        kubectl get nodes
        kubectl get pods -A

    - name: Deploy
      run: |

        kubectl set image deployment/frontend \
          frontend=${{ secrets.ACR_NAME }}.azurecr.io/frontend-service:v1

        kubectl rollout status deployment/frontend-service