apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service-v1

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:

      imagePullSecrets:
      - name: acr-secret

      containers:
      - name: frontend

        image: acrpaypal1783931919.azurecr.io/frontend-service:v1

        imagePullPolicy: Always

        ports:
        - containerPort: 3001
