image:
  repository: acrpaypal1784528210.azurecr.io/frontend-service
  tag: cfd85b824da68020615fbca7c2867f6e29136e98
  pullPolicy: Always

replicaCount: 3

service:
  type: ClusterIP
  port: 80
  targetPort: 3001

imagePullSecrets:
  - name: acr-secret

ingress:
  enabled: true

  className: nginx

  # host: paypal.local

  path: /

  pathType: Prefix

config:
  appName: "Paypal Frontend"
  environment: "DEV"

secret:
  apiKey: "paypal-api-key-123"
  dbPassword: "paypal-db-password"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"

  limits:
    cpu: "300m"
    memory: "256Mi"