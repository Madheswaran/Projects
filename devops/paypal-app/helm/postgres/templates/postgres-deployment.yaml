apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        envFrom:
        - secretRef:
            name: postgres-secret
        env:
        - name: PGDATA
          value: {{ .Values.database.pgdata }}
        ports:
        - containerPort: {{ .Values.service.port }}
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgres-storage
          
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
          resources:
            requests:
              storage: {{ .Values.storage.size }}