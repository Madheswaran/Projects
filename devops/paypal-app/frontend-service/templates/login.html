<!DOCTYPE html>
<html>

<head>
    <title>{{ APP_NAME }}</title>
</head>

<body>

    <h1>{{ APP_NAME }}</h1>

    <h3>{{ ENV_NAME }}</h3>

    {% if error %}
    <p style="color:red">{{ error }}</p>
    {% endif %}

    <form method="POST">

        <p>Email</p>

        <input
            type="email"
            name="email"
            required>

        <br><br>

        <p>Password</p>

        <input
            type="password"
            name="password"
            required>

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

</body>

</html>
