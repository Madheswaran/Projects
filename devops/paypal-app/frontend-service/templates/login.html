<!DOCTYPE html>
<html>

<head>

<title>PayPal Checkout</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="login-page">

<div class="login-card">

<div class="left">

<h1>PayPal Checkout</h1>

<p>
Simple shopping experience powered by Kubernetes,
Helm, Azure DevOps and ArgoCD.
</p>

</div>

<div class="right">

<h2>Login</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

</div>

</div>

</body>

</html>
